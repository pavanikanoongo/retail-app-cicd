name: Retail App CI/CD
on:
  push:
    branches: [ "main" ]
jobs:
  test-stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - name: Run Unit Tests
        run: npm test
  build-stage:
    needs: test-stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t retail-app .
